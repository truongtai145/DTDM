# ===== COUNTER APP DEPLOYMENT =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-deployment
  labels:
    app: counter
spec:
  replicas: 3          # 3 Pod chạy song song → thấy load balancing
  selector:
    matchLabels:
      app: counter
  template:
    metadata:
      labels:
        app: counter
    spec:
      containers:
      - name: counter
        image: k8s-counter:1.0
        imagePullPolicy: Never   # Dùng image local từ Minikube
        ports:
        - containerPort: 3000
        env:
        - name: REDIS_HOST
          value: "redis-service"   # Tên Service của Redis
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
# ===== COUNTER SERVICE =====
apiVersion: v1
kind: Service
metadata:
  name: counter-service
spec:
  type: NodePort
  selector:
    app: counter
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080
